#hub_router_1.0.1/nginx/conf.d/login.hubrouter.com.br.conf

# ==============================
# login.hubrouter.com.br.conf
# ==============================

# Redireciona HTTP -> HTTPS (exceto ACME challenge)
server {
    listen 80;
    server_name login.hubrouter.com.br;

    client_max_body_size 20M;


    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name login.hubrouter.com.br;

    resolver 127.0.0.11 valid=10s;
    set $frontend_upstream http://frontend_service:80;
    set $api_gateway_upstream http://api_gateway:8000;

    client_max_body_size 20M;


    ssl_certificate           /etc/letsencrypt/live/login.hubrouter.com.br/fullchain.pem;
    ssl_certificate_key       /etc/letsencrypt/live/login.hubrouter.com.br/privkey.pem;
    ssl_trusted_certificate   /etc/letsencrypt/live/login.hubrouter.com.br/chain.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # ========================
    # SPA (React / Vite)
    # ========================
    location / {
        proxy_pass $frontend_upstream;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ========================
    # API Routes (via api_gateway)
    # ========================

    location /auth/ {
        proxy_pass $api_gateway_upstream;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization     $http_authorization;
    }

    location /data_input/ {
        proxy_pass $api_gateway_upstream;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization     $http_authorization;

        # 🔥 ESTABILIDADE (ESSENCIAL)
        proxy_http_version 1.1;
        proxy_set_header Connection "";

        # 🔥 RETRY AUTOMÁTICO
        proxy_next_upstream error timeout http_502 http_503 http_504;
        proxy_next_upstream_tries 3;

        proxy_connect_timeout 5s;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    location /clusterization/ {
        proxy_pass $api_gateway_upstream;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization     $http_authorization;
    }

    location /last_mile_routing/ {
        proxy_pass $api_gateway_upstream;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization     $http_authorization;
    }

    location /transfer_routing/ {
        proxy_pass $api_gateway_upstream;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization     $http_authorization;
    }

    location /costs_last_mile/ {
        proxy_pass $api_gateway_upstream;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization     $http_authorization;
    }

    location /costs_transfer/ {
        proxy_pass $api_gateway_upstream;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization     $http_authorization;
    }

    location /simulation/ {
        proxy_pass $api_gateway_upstream;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization     $http_authorization;
    }

    location /exploratory/ {
        proxy_pass $api_gateway_upstream;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization     $http_authorization;
    }

    location /ml/ {
        proxy_pass $api_gateway_upstream;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization     $http_authorization;
    }
}
