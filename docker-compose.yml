#hub_router_1.0.1/docker-compose.yml

services:

  postgres:
    image: postgis/postgis:17-3.4
    container_name: postgres_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: Psilas@85
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - hub_router_network
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: redis
    ports:
      - "6379:6379"
    networks:
      - hub_router_network
    restart: always

  data_input_service:
    image: psilas85/hub_router-data_input:latest
    build:
      context: .
      dockerfile: src/data_input/Dockerfile.data_input
    ports:
      - "8008:8008"
    volumes:
      - ./src:/app/src
      - ./src/data_input/tenants:/app/src/data_input/tenants
      - ./data/ibge:/app/data/ibge
    env_file:
      - ./src/data_input/.env
    environment:
      - PYTHONPATH=/app/src
      - AUTH_SECRET_KEY=MinhaChaveUltraSegura123
      - REDIS_URL=redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - hub_router_network
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8008/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  data_input_worker:
    image: psilas85/hub_router-data_input:latest
    command: rq worker -u redis://redis:6379 data_input_jobs
    volumes:
      - ./src:/app/src
      - ./src/data_input/tenants:/app/src/data_input/tenants
      - ./data/ibge:/app/data/ibge
    env_file:
      - ./src/data_input/.env
    environment:
      - PYTHONPATH=/app/src
      - AUTH_SECRET_KEY=MinhaChaveUltraSegura123
      - REDIS_URL=redis://redis:6379
    depends_on:
      - redis
      - postgres
    networks:
      - hub_router_network
    restart: always

  data_input_subjob_worker:
    image: psilas85/hub_router-data_input:latest
    command: rq worker -u redis://redis:6379 data_input_subjobs
    volumes:
      - ./src:/app/src
      - ./src/data_input/tenants:/app/src/data_input/tenants
      - ./data/ibge:/app/data/ibge
    env_file:
      - ./src/data_input/.env
    environment:
      - PYTHONPATH=/app/src
      - AUTH_SECRET_KEY=MinhaChaveUltraSegura123
      - REDIS_URL=redis://redis:6379
    depends_on:
      - redis
      - postgres
    networks:
      - hub_router_network
    restart: always

  simulation_worker:
    image: psilas85/hub_router-simulation:latest
    command: rq worker -u redis://redis:6379 simulation_jobs
    volumes:
      - ./src:/app/src
      - ./exports:/app/exports
    env_file:
      - ./src/simulation/.env
    environment:
      - PYTHONPATH=/app/src
    depends_on:
      - redis
      - postgres
    networks:
      - hub_router_network
    restart: always
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  simulation_date_worker:
    image: psilas85/hub_router-simulation:latest
    command: rq worker -u redis://redis:6379 simulation_date_jobs
    volumes:
      - ./src:/app/src
      - ./exports:/app/exports
    env_file:
      - ./src/simulation/.env
    environment:
      - PYTHONPATH=/app/src
      - SIMULATION_INTERNAL_MAX_WORKERS=1
    depends_on:
      - redis
      - postgres
    networks:
      - hub_router_network
    restart: always
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"


  authentication_service:
    build:
      context: .
      dockerfile: src/authentication/Dockerfile.authentication
    image: psilas85/hub_router-authentication:latest
    ports:
      - "8001:8000"
    volumes:
      - ./src:/app/src
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - PYTHONPATH=/app/src
      - AUTH_SECRET_KEY=MinhaChaveUltraSegura123
    env_file:
      - ./src/authentication/.env
    networks:
      - hub_router_network
    restart: always


  clusterization_service:
    build:
      context: .
      dockerfile: src/clusterization/Dockerfile.clusterization
    image: psilas85/hub_router-clusterization:latest
    ports:
      - "8012:8001"
    volumes:
      - ./src:/app/src
      - ./exports/clusterization:/app/output
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - PYTHONPATH=/app/src
    env_file:
      - ./src/clusterization/.env
    networks:
      - hub_router_network
    restart: always

  last_mile_routing_service:
    build:
      context: .
      dockerfile: src/last_mile_routing/Dockerfile.last_mile_routing
    image: psilas85/hub_router-last_mile_routing:latest
    ports:
      - "8003:8002"
    volumes:
      - ./src:/app/src
      - ./exports:/app/exports
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - PYTHONPATH=/app/src
    env_file:
      - ./src/last_mile_routing/.env
    networks:
      - hub_router_network
    restart: always

  transfer_routing_service:
    build:
      context: .
      dockerfile: src/transfer_routing/Dockerfile.transfer_routing
    image: psilas85/hub_router-transfer_routing:latest
    ports:
      - "8004:8003"
    volumes:
      - ./src:/app/src
      - ./exports/transfer_routing:/app/output
    env_file:
      - ./src/transfer_routing/.env
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - PYTHONPATH=/app/src
    networks:
      - hub_router_network
    restart: always

  costs_last_mile_service:
    build:
      context: .
      dockerfile: src/costs_last_mile/Dockerfile.costs_last_mile
    image: psilas85/hub_router-costs_last_mile:latest
    ports:
      - "8005:8004"
    volumes:
      - ./src:/app/src
      - ./exports/costs_last_mile:/app/exports/costs_last_mile
    env_file:
      - ./src/costs_last_mile/.env
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - PYTHONPATH=/app/src
    networks:
      - hub_router_network
    restart: always

  costs_transfer_service:
    build:
      context: .
      dockerfile: src/costs_transfer/Dockerfile.costs_transfer
    image: psilas85/hub_router-costs_transfer:latest
    ports:
      - "8006:8005"
    volumes:
      - ./src:/app/src
      - ./exports/costs_transfer:/app/exports/costs_transfer
    env_file:
      - ./src/costs_transfer/.env
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - PYTHONPATH=/app/src
    networks:
      - hub_router_network
    restart: always


  simulation_service:
    build:
      context: .
      dockerfile: src/simulation/Dockerfile.simulation
    image: psilas85/hub_router-simulation:latest
    ports:
      - "8007:8006"
    volumes:
      - ./src:/app/src
      - ./exports/simulation:/app/exports/simulation
    env_file:
      - ./src/simulation/.env
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - PYTHONPATH=/app/src
    networks:
      - hub_router_network
    restart: always


  exploratory_analysis_service:
    build:
      context: .
      dockerfile: src/exploratory_analysis/Dockerfile.exploratory
    image: psilas85/hub_router-exploratory:latest
    container_name: exploratory_analysis_service
    ports:
      - "8015:8015"
    volumes:
      - ./src:/app/src
    env_file:
      - ./src/exploratory_analysis/.env
    environment:
      - PYTHONPATH=/app/src
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - hub_router_network
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8015/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  osrm:
    image: osrm/osrm-backend:latest
    container_name: osrm_service
    command: osrm-routed --algorithm ch /data/nordeste-latest.osrm
    ports:
      - "5000:5000"
    volumes:
      - ./osrm-data:/data
    networks:
      - hub_router_network
    restart: always


  ml_pipeline_service:
    build:
      context: .
      dockerfile: src/ml_pipeline/Dockerfile.ml_pipeline
    image: psilas85/hub_router-ml_pipeline:latest
    container_name: hub_router_101-ml_pipeline_service
    ports:
      - "8011:8011"
    volumes:
      - ./src:/app/src
      - ./models:/app/models
      - ./exports/ml_pipeline:/app/exports/ml_pipeline
    env_file:
      - ./src/ml_pipeline/.env
    environment:
      - PYTHONPATH=/app/src
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - hub_router_network
    restart: always

  frontend_service:
    build:
      context: ./frontend
      dockerfile: Dockerfile.frontend
    image: psilas85/hub_router-frontend:latest
    ports:
      - "8080:80"
    volumes:
      - ./exports:/app/exports
    networks:
      - hub_router_network
    restart: always

  machine_learning_service:
    build:
      context: .
      dockerfile: src/machine_learning/Dockerfile.machine_learning
    image: psilas85/hub_router-machine_learning:latest
    container_name: hub_router_101-machine_learning_service
    ports:
      - "8014:8014"
    volumes:
      - ./src:/app/src
      - ./models:/app/models
      - ./exports/machine_learning:/app/exports/machine_learning
    env_file:
      - ./src/machine_learning/.env
    environment:
      - PYTHONPATH=/app/src
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - hub_router_network
    restart: always

  api_gateway:
    container_name: api_gateway
    build:
      context: ./src/api_gateway
      dockerfile: Dockerfile.api_gateway
    ports:
      - "8010:8000"
    volumes:
      - ./src:/app/src
      - ./exports:/app/exports
    env_file:
      - ./src/api_gateway/.env
    environment:
      - PYTHONPATH=/app/src
    depends_on:
      authentication_service:
        condition: service_started
      data_input_service:
        condition: service_healthy
    networks:
      - hub_router_network
    restart: always

  nginx:
    image: nginx:latest
    container_name: hub_router_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d
      - ./nginx/certs:/etc/letsencrypt
      - ./nginx/www:/var/www/certbot
      - ./exports:/app/exports
    depends_on:
      frontend_service:
        condition: service_started
      api_gateway:
        condition: service_started
      data_input_service:
        condition: service_healthy
    networks:
      - hub_router_network
    restart: always

  certbot:
    image: certbot/certbot:latest
    container_name: hub_router_certbot
    entrypoint: certbot
    volumes:
      - ./nginx/certs:/etc/letsencrypt
      - ./nginx/conf.d:/etc/nginx/conf.d
      - ./nginx/www:/var/www/certbot
    networks:
      - hub_router_network
    restart: "no"


networks:
  hub_router_network:
    external: true

volumes:
  postgres_data:



